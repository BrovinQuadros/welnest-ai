services:
  - type: web
    name: welnest-backend
    env: python
    rootDir: welnest-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYMONGO_DISABLE_PYOPENSSL
        value: "1"